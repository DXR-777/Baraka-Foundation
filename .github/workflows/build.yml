name: Build Baraka APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        run: bash gradlew assembleDebug || true 
      # ملاحظة: إذا لم تملك ملف gradlew، سنستخدم أمراً بديلاً في الخطوة القادمة
